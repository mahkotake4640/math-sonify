name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_LOG: warn

jobs:
  # Minimal job matching the production-ready spec: check + lib tests + clippy + fmt.
  # Uses --lib to avoid any audio device dependency on the CI runner.
  test-lib:
    name: test --lib (spec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Install Linux audio and GUI dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libasound2-dev libdbus-1-dev libpulse-dev pkg-config \
            libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libssl-dev
      - run: cargo check
      - run: cargo test --lib
      - run: cargo clippy -- -D warnings
      - run: cargo fmt --check

  fmt:
    name: Rustfmt check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install Linux audio and GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libasound2-dev libdbus-1-dev libpulse-dev pkg-config \
            libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libssl-dev
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy -- -D warnings
        run: cargo clippy --lib --tests -- -D warnings

  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux audio and GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libasound2-dev libdbus-1-dev libpulse-dev pkg-config \
            libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libssl-dev
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (excluding GUI tests that need a display)
        run: cargo test --lib --tests -- --skip ui_ --skip draw_ui

  doc:
    name: Cargo doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux audio and GUI dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libasound2-dev libdbus-1-dev libpulse-dev pkg-config \
            libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libssl-dev
      - uses: Swatinem/rust-cache@v2
      - name: cargo doc (deny warnings)
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --no-deps --lib

  build-release:
    name: Build release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux audio and GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libasound2-dev libdbus-1-dev libpulse-dev pkg-config \
            libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libssl-dev
      - uses: Swatinem/rust-cache@v2
      - name: cargo build --release
        run: cargo build --release --lib
      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: math-sonify-linux
          path: target/release/libmath_sonify_plugin.so
          if-no-files-found: warn
      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: math-sonify-windows
          path: target/release/math_sonify_plugin.dll
          if-no-files-found: warn

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install audio deps
        run: sudo apt-get install -y libasound2-dev libjack-jackd2-dev
      - run: cargo install cargo-tarpaulin --locked
      - run: cargo tarpaulin --out Xml --exclude-files "src/plugin.rs" --engine llvm
      - uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit --locked
      - run: cargo audit --ignore RUSTSEC-2021-0139
